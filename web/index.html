<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>PL Record Book — DW2 Pro League</title>
  <meta name="description" content="DW2 Pro League Record Book — Rankings, player stats, match history and tournament records.">
  <link rel="icon" type="image/png" href="assets/pl-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ── Header ─────────────────────────────────── -->
    <header class="header">
      <div class="header-inner">
        <div class="logo" onclick="navigate('home')">
          <img src="assets/pl-logo.png" class="logo-img" alt="PL">
          <span class="logo-text">PL<span class="logo-accent">RECORD</span>BOOK</span>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-page="home" onclick="navigate('home')">Home</button>
          <button class="nav-btn" data-page="rankings" onclick="navigate('rankings')">Rankings</button>
          <button class="nav-btn" data-page="players" onclick="navigate('players')">Players</button>
          <button class="nav-btn" data-page="events" onclick="navigate('events')">Events</button>
          <button class="nav-btn" data-page="stats" onclick="navigate('stats')">Stats</button>
        </nav>
        <div class="header-right">
          <div class="region-selector" id="regionSelector">
            <button class="region-btn active" data-region="Global" onclick="setRegion('Global')">ALL</button>
            <button class="region-btn" data-region="EU" onclick="setRegion('EU')">EU</button>
            <button class="region-btn" data-region="NA" onclick="setRegion('NA')">NA</button>
            <button class="region-btn" data-region="SA" onclick="setRegion('SA')">SA</button>
            <button class="region-btn" data-region="AS" onclick="setRegion('AS')">AS</button>
          </div>
          <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">⚙️ Admin</button>
          <div class="admin-menu hidden" id="adminMenu">
            <div id="adminLogin">
              <input type="email" id="adminEmail" placeholder="Email" class="admin-input">
              <input type="password" id="adminPass" placeholder="Password" class="admin-input">
              <button class="admin-login-btn" onclick="adminLogin()">Login</button>
            </div>
            <div id="adminPanel" class="hidden">
              <button class="admin-action" onclick="navigate('admin-players')">Manage Players</button>
              <button class="admin-action" onclick="navigate('admin-matches')">Add Match</button>
              <button class="admin-action" onclick="navigate('admin-events')">Manage Events</button>
              <button class="admin-action" onclick="exportPDF()">📄 Export PDF</button>
              <button class="admin-action" onclick="exportSheets()">📊 Export Sheets</button>
              <button class="admin-logout" onclick="adminLogout()">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Main Content ─────────────────────────── -->
    <main class="main" id="mainContent">
      <!-- Content rendered by JS -->
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading PL Record Book...</p>
      </div>
    </main>

    <!-- ── Footer ───────────────────────────────── -->
    <footer class="footer">
      <div class="footer-inner">
        <p>PL Record Book — Drunken Wrestlers 2 Pro League</p>
        <p class="footer-sub">Data source: Firestore · Built with ❤️ by ProtagoNix</p>
      </div>
    </footer>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, setDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    
    // ── Config ──────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDvDk5aoU-UDidEnn5HowUyRQLdatTQ-nI",
      authDomain: "pl-dashboard-f7315.firebaseapp.com",
      projectId: "pl-dashboard-f7315",
      storageBucket: "pl-dashboard-f7315.firebasestorage.app",
      messagingSenderId: "98422610300",
      appId: "1:98422610300:web:a138666f2218634d152cf9"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    // ── State ───────────────────────────────────────
    let state = {
      page: 'home',
      region: 'Global',
      players: [],
      matches: [],
      events: [],
      currentUser: null,
      isAdmin: false,
      searchQuery: ''
    };
    
    // ── Constants ───────────────────────────────────
    const REGION_FLAGS = { EU:'EU', NA:'NA', SA:'SA', AS:'AS', Global:'ALL' };
    const REGION_COLORS = { EU:'#c0c0c0', NA:'#808080', SA:'#a0a0a0', AS:'#909090', Global:'#f7f5f6' };
    const ALL_REGIONS = ['EU', 'NA', 'SA', 'AS', 'Global'];
    
    // ── Data Loading ────────────────────────────────
    async function loadData() {
      try {
        const [playersSnap, matchesSnap, eventsSnap] = await Promise.all([
          getDocs(collection(db, 'players')),
          getDocs(collection(db, 'matches')),
          getDocs(collection(db, 'events'))
        ]);
        
        state.players = playersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        state.matches = matchesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        state.events = eventsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        
        // Build player lookup map by name (for match linking)
        state.playerByName = {};
        state.players.forEach(p => {
          if (p.name) state.playerByName[p.name.toLowerCase()] = p;
        });
        
        console.log(`Loaded: ${state.players.length} players, ${state.matches.length} matches, ${state.events.length} events`);
        render();
      } catch (e) {
        console.error('Load error:', e);
        document.getElementById('mainContent').innerHTML = `
          <div class="error-state">
            <h2>⚠️ Could not load data</h2>
            <p>Make sure Firebase is configured correctly.</p>
            <p class="error-detail">${e.message}</p>
          </div>`;
      }
    }
    
    // ── Helpers ─────────────────────────────────────
    // Get matches for a player by name (checks both player1 and player2)
    function getMatchesForPlayer(playerName) {
      const ln = playerName.toLowerCase();
      return state.matches.filter(m => 
        (m.player1 && m.player1.toLowerCase() === ln) ||
        (m.player2 && m.player2.toLowerCase() === ln)
      );
    }
    
    // Calculate FOTN count for a player
    function getFotnCount(playerName) {
      return getMatchesForPlayer(playerName).filter(m => m.fotn).length;
    }
    
    // Check if player is a champion (position === 'Champion')
    function isChampion(player) {
      return player.position === 'Champion' || (player.position && player.position.toLowerCase().includes('champion'));
    }
    
    // Get region for a player
    function getPlayerRegion(name) {
      const p = state.playerByName[name.toLowerCase()];
      return p ? p.region : 'Global';
    }
    
    // ── Navigation ──────────────────────────────────
    window.navigate = function(page) {
      state.page = page;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector(`[data-page="${page}"]`);
      if (btn) btn.classList.add('active');
      render();
      window.scrollTo(0, 0);
    };
    
    window.setRegion = function(region) {
      state.region = region;
      document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-region="${region}"]`).classList.add('active');
      render();
    };
    
    // ── Admin ───────────────────────────────────────
    window.toggleAdmin = function() {
      const menu = document.getElementById('adminMenu');
      menu.classList.toggle('hidden');
    };
    
    window.adminLogin = async function() {
      const email = document.getElementById('adminEmail').value;
      const pass = document.getElementById('adminPass').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        const adminDoc = await getDoc(doc(db, 'admins', 'admin_user'));
        if (adminDoc.exists() && adminDoc.data().uid === auth.currentUser.uid) {
          state.isAdmin = true;
          state.currentUser = auth.currentUser;
          updateAdminUI();
          navigate('admin-players');
        } else {
          alert('You are logged in but not an admin.');
          state.isAdmin = false;
        }
      } catch (e) {
        alert('Login failed: ' + e.message);
      }
    };
    
    window.adminLogout = async function() {
      await signOut(auth);
      state.isAdmin = false;
      state.currentUser = null;
      updateAdminUI();
      navigate('home');
    };
    
    function updateAdminUI() {
      document.getElementById('adminLogin').classList.toggle('hidden', state.isAdmin);
      document.getElementById('adminPanel').classList.toggle('hidden', !state.isAdmin);
      const btn = document.getElementById('adminBtn');
      btn.textContent = state.isAdmin ? '⚙️ Admin ✓' : '⚙️ Admin';
      btn.classList.toggle('admin-active', state.isAdmin);
    }
    
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const adminDoc = await getDoc(doc(db, 'admins', 'admin_user'));
          state.isAdmin = adminDoc.exists() && adminDoc.data().uid === user.uid;
        } catch(e) {
          state.isAdmin = false;
        }
        state.currentUser = user;
      } else {
        state.isAdmin = false;
        state.currentUser = null;
      }
      updateAdminUI();
    });
    
    // ── Export stubs ────────────────────────────────
    window.exportPDF = function() { alert('PDF export coming soon!'); };
    window.exportSheets = function() { alert('Sheets export coming soon!'); };
    
    // ── Render ──────────────────────────────────────
    function render() {
      const main = document.getElementById('mainContent');
      switch(state.page) {
        case 'home': main.innerHTML = renderHome(); break;
        case 'rankings': main.innerHTML = renderRankings(); break;
        case 'players': main.innerHTML = renderPlayers(); break;
        case 'events': main.innerHTML = renderEvents(); break;
        case 'stats': main.innerHTML = renderStats(); break;
        case 'admin-players': main.innerHTML = renderAdminPlayers(); break;
        case 'admin-matches': main.innerHTML = renderAdminMatches(); break;
        case 'admin-events': main.innerHTML = renderAdminEvents(); break;
        default: main.innerHTML = renderHome();
      }
      attachHandlers();
    }
    
    // ── Home ────────────────────────────────────────
    function renderHome() {
      const totalPlayers = state.players.length;
      const totalMatches = state.matches.length;
      const totalEvents = state.events.length;
      const totalFotn = state.matches.filter(m => m.fotn).length;
      const regions = ['EU', 'NA', 'SA', 'AS'];
      
      let regionCards = regions.map(r => {
        const count = state.players.filter(p => p.region === r).length;
        return `
          <div class="region-card" style="--accent:${REGION_COLORS[r]}" onclick="setRegion('${r}'); navigate('rankings')">
            <div class="region-flag">${REGION_FLAGS[r]}</div>
            <div class="region-name">${r}</div>
            <div class="region-count">${count} players</div>
          </div>`;
      }).join('');
      
      // Recent matches (last 15)
      const recent = [...state.matches].sort((a,b) => (b.createdAt||0) - (a.createdAt||0)).slice(0, 15);
      
      return `
        <div class="page-home">
          <div class="hero">
            <h1>PL RECORD BOOK</h1>
            <p class="hero-sub">DW2 Pro League — Official Records & Statistics</p>
          </div>
          <div class="stats-bar">
            <div class="stat-pill"><span class="stat-num">${totalPlayers}</span><span class="stat-label">Players</span></div>
            <div class="stat-pill"><span class="stat-num">${totalMatches}</span><span class="stat-label">Matches</span></div>
            <div class="stat-pill"><span class="stat-num">${totalEvents}</span><span class="stat-label">Events</span></div>
            <div class="stat-pill"><span class="stat-num">${totalFotn}</span><span class="stat-label">FOTNs</span></div>
          </div>
          <div class="region-grid">${regionCards}</div>
          <div class="home-section">
            <h2>Recent Matches</h2>
            <div class="match-list">${renderMatchList(recent)}</div>
          </div>
        </div>`;
    }
    
    // ── Rankings ────────────────────────────────────
    function renderRankings() {
      const region = state.region;
      let players = region === 'Global'
        ? [...state.players]
        : state.players.filter(p => p.region === region);
      
      // Sort: champions first, then by position number, then by wins
      players.sort((a, b) => {
        const aChamp = isChampion(a);
        const bChamp = isChampion(b);
        if (aChamp && !bChamp) return -1;
        if (!aChamp && bChamp) return 1;
        // Try to sort by position (#1, #2, etc)
        const aPos = parseInt(a.position) || 999;
        const bPos = parseInt(b.position) || 999;
        if (aPos !== bPos) return aPos - bPos;
        return (b.wins || 0) - (a.wins || 0);
      });
      
      if (players.length === 0) {
        return `<div class="empty-state"><p>No ranked players in ${region} yet.</p></div>`;
      }
      
      let rows = players.map((p, i) => {
        const pos = i + 1;
        const wins = p.wins || 0;
        const losses = p.losses || 0;
        const total = wins + losses;
        const winRate = total > 0 ? Math.round(wins / total * 100) : 0;
        const flag = REGION_FLAGS[p.region] || '';
        const tier = p.tier && p.tier !== 'ranked' && p.tier !== 'unranked' ? `<span class="tier-badge tier-${p.tier.toLowerCase()}">${p.tier}</span>` : '';
        const aff = p.affiliation ? `<span class="aff-tag">${p.affiliation}</span>` : '';
        const champIcon = isChampion(p) ? '👑' : (pos === 1 ? '👑' : '#' + pos);
        const fotns = getFotnCount(p.name);
        const fotnBadge = fotns > 0 ? `<span class="fotn-count">🌟 ${fotns}</span>` : '';
        
        return `
          <div class="ranking-row" onclick="showPlayerByName('${(p.name || '').replace(/'/g, "\\'")}')">
            <div class="rank-pos">${champIcon}</div>
            <div class="player-avatar placeholder" style="--accent:${REGION_COLORS[p.region]||'#666'}">${p.name?.charAt(0)?.toUpperCase() || '?'}</div>
            <div class="rank-info">
              <div class="rank-name">${p.name || 'Unknown'} ${flag}</div>
              <div class="rank-tags">${tier} ${aff} ${fotnBadge}</div>
            </div>
            <div class="rank-record">${wins}-${losses}</div>
            <div class="rank-winrate">${winRate}%</div>
          </div>`;
      }).join('');
      
      return `
        <div class="page-rankings">
          <h2>${REGION_FLAGS[region] || ''} ${region} Rankings</h2>
          <div class="ranking-list">${rows}</div>
        </div>`;
    }
    
    // ── Players ─────────────────────────────────────
    function renderPlayers() {
      let players = state.region === 'Global'
        ? [...state.players]
        : state.players.filter(p => p.region === state.region);
      
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        players = players.filter(p => p.name?.toLowerCase().includes(q));
      }
      
      // Deduplicate by name (keep the one with most data)
      let seen = {};
      players = players.filter(p => {
        const key = (p.name || '').toLowerCase();
        if (seen[key]) return false;
        seen[key] = true;
        return true;
      });
      
      players.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      
      return `
        <div class="page-players">
          <div class="search-bar">
            <input type="text" placeholder="Search player..." id="playerSearch"
              value="${state.searchQuery}" oninput="onSearch(this.value)">
          </div>
          <div class="player-grid">
            ${players.map(p => {
              const flag = REGION_FLAGS[p.region] || '';
              const wins = p.wins || 0;
              const losses = p.losses || 0;
              const fotns = getFotnCount(p.name);
              return `
                <div class="player-card" onclick="showPlayerByName('${(p.name || '').replace(/'/g, "\\'")}')">
                  <div class="player-avatar placeholder" style="--accent:${REGION_COLORS[p.region]||'#666'}">${p.name?.charAt(0)?.toUpperCase() || '?'}</div>
                  <div class="player-card-name">${p.name || 'Unknown'} ${flag}</div>
                  <div class="player-card-tags">${p.affiliation ? `<span class="aff-tag">${p.affiliation}</span>` : ''}</div>
                  <div class="player-card-record">${wins}W - ${losses}L${fotns > 0 ? ` · 🌟 ${fotns}` : ''}</div>
                </div>`;
            }).join('') || '<p class="empty-state">No players found.</p>'}
          </div>
        </div>`;
    }
    
    // ── Events ──────────────────────────────────────
    function renderEvents() {
      let events = [...state.events].sort((a, b) => {
        // Sort by name alphabetically (events don't have real dates)
        return (a.name || '').localeCompare(b.name || '');
      });
      
      // Group by region if in a specific region
      const region = state.region;
      if (region !== 'Global') {
        events = events.filter(e => !e.region || e.region === region || e.region === 'Global');
      }
      
      if (events.length === 0) {
        return `<div class="empty-state"><p>No events yet.</p></div>`;
      }
      
      // Group by type (Tournament vs Fight Night vs numbered)
      let tournaments = events.filter(e => e.isTournament || /tournament/i.test(e.name));
      let fightNights = events.filter(e => !e.isTournament && /fight night/i.test(e.name));
      let numbered = events.filter(e => !e.isTournament && !/fight night|tournament/i.test(e.name));
      
      function renderEventGroup(title, evts) {
        if (evts.length === 0) return '';
        return `<div class="event-group">
          <h3>${title} (${evts.length})</h3>
          <div class="event-list">
            ${evts.map(e => {
              const type = e.isTournament ? '🏆 Tournament' : '🥊 Fight Night';
              const matchCount = state.matches.filter(m => m.event === e.name).length;
              return `
                <div class="event-card" onclick="showEvent('${(e.name || '').replace(/'/g, "\\'")}')">
                  <div class="event-info">
                    <div class="event-name">${e.name}</div>
                    <div class="event-type">${type} · ${matchCount} matches</div>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>`;
      }
      
      return `
        <div class="page-events">
          <h2>Events ${region !== 'Global' ? '— ' + region : ''}</h2>
          ${renderEventGroup('Tournaments', tournaments)}
          ${renderEventGroup('Fight Nights', fightNights)}
          ${renderEventGroup('Numbered Events', numbered)}
        </div>`;
    }
    
    // ── Stats ───────────────────────────────────────
    function renderStats() {
      const totalPlayers = state.players.length;
      const totalMatches = state.matches.length;
      const totalFotn = state.matches.filter(m => m.fotn).length;
      const totalTitles = state.matches.filter(m => m.titleFight).length;
      const regions = ['EU', 'NA', 'SA', 'AS'];
      
      let regionStats = regions.map(r => {
        const players = state.players.filter(p => p.region === r);
        const matches = state.matches.filter(m => m.region === r);
        return { region: r, players: players.length, matches: matches.length };
      });
      
      // Top FOTN winners
      let fotnPlayers = {};
      state.matches.filter(m => m.fotn).forEach(m => {
        const p1 = m.player1 || '';
        const p2 = m.player2 || '';
        if (p1) fotnPlayers[p1] = (fotnPlayers[p1] || 0) + 1;
        if (p2) fotnPlayers[p2] = (fotnPlayers[p2] || 0) + 1;
      });
      let topFotn = Object.entries(fotnPlayers).sort((a,b) => b[1] - a[1]).slice(0, 5);
      
      // Top by wins
      let topWins = [...state.players].filter(p => (p.wins||0) > 0).sort((a,b) => (b.wins||0) - (a.wins||0)).slice(0, 10);
      
      return `
        <div class="page-stats">
          <h2>League Statistics</h2>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-big">${totalPlayers}</div><div class="stat-label">Total Players</div></div>
            <div class="stat-card"><div class="stat-big">${totalMatches}</div><div class="stat-label">Total Matches</div></div>
            <div class="stat-card"><div class="stat-big">${totalFotn}</div><div class="stat-label">FOTNs</div></div>
            <div class="stat-card"><div class="stat-big">${totalTitles}</div><div class="stat-label">Title Fights</div></div>
          </div>
          <div class="stats-section">
            <h3>By Region</h3>
            <div class="region-stats">
              ${regionStats.map(rs => `
                <div class="region-stat-row">
                  <span class="region-flag">${REGION_FLAGS[rs.region]}</span>
                  <span class="region-name">${rs.region}</span>
                  <span>${rs.players} players</span>
                  <span>${rs.matches} matches</span>
                </div>`).join('')}
            </div>
          </div>
          <div class="stats-section">
            <h3>Top 10 by Wins</h3>
            <div class="ranking-list">
              ${topWins.map((p, i) => {
                const wins = p.wins || 0;
                const losses = p.losses || 0;
                const wr = wins + losses > 0 ? Math.round(wins/(wins+losses)*100) : 0;
                return `<div class="ranking-row" onclick="showPlayerByName('${(p.name||'').replace(/'/g, "\\'")}')">
                  <div class="rank-pos">#${i+1}</div>
                  <div class="player-avatar placeholder" style="--accent:${REGION_COLORS[p.region]||'#666'}">${p.name?.charAt(0)?.toUpperCase()||'?'}</div>
                  <div class="rank-info"><div class="rank-name">${p.name} ${REGION_FLAGS[p.region]||''}</div><div class="rank-tags">${p.affiliation ? `<span class="aff-tag">${p.affiliation}</span>` : ''}</div></div>
                  <div class="rank-record">${wins}-${losses}</div>
                  <div class="rank-winrate">${wr}%</div>
                </div>`;
              }).join('')}
            </div>
          </div>
          ${topFotn.length > 0 ? `
          <div class="stats-section">
            <h3>🌟 Most FOTN Awards</h3>
            <div class="ranking-list">
              ${topFotn.map(([name, count], i) => `
                <div class="ranking-row" onclick="showPlayerByName('${name.replace(/'/g, "\\'")}')">
                  <div class="rank-pos">#${i+1}</div>
                  <div class="player-avatar placeholder" style="--accent:${REGION_COLORS[getPlayerRegion(name)]||'#666'}">${name.charAt(0).toUpperCase()}</div>
                  <div class="rank-info"><div class="rank-name">${name} ${REGION_FLAGS[getPlayerRegion(name)]||''}</div></div>
                  <div class="rank-record">🌟 ${count}</div>
                </div>`).join('')}
            </div>
          </div>` : ''}
        </div>`;
    }
    
    // ── Match List (deduplicated format) ────────────
    function renderMatchList(matches) {
      if (!matches || matches.length === 0) return '<p class="empty-state">No matches recorded yet.</p>';
      return matches.map(m => {
        const p1 = m.player1 || '?';
        const p2 = m.player2 || '?';
        const score = m.score || '';
        const fotn = m.fotn ? '<span class="fotn-badge">🌟 FOTN</span>' : '';
        const title = m.titleFight ? '<span class="title-badge">🏆 Title</span>' : '';
        const vod = m.vod ? `<a href="${m.vod}" target="_blank" class="vod-link">▶ VOD</a>` : '';
        const notes = m.notes ? `<div class="match-notes">${m.notes}</div>` : '';
        return `
          <div class="match-row">
            <div class="match-players">
              <span class="match-player" onclick="showPlayerByName('${p1.replace(/'/g, "\\'")}')">${p1}</span>
              <span class="match-vs">vs</span>
              <span class="match-opponent" onclick="showPlayerByName('${p2.replace(/'/g, "\\'")}')">${p2}</span>
            </div>
            <div class="match-score">${score} ${fotn} ${title}</div>
            <div class="match-event">${m.event || ''}</div>
            ${notes}
            <div>${vod}</div>
          </div>`;
      }).join('');
    }
    
    // ── Admin Pages ─────────────────────────────────
    function renderAdminPlayers() {
      if (!state.isAdmin) return '<div class="error-state"><p>Admin access required.</p></div>';
      return `
        <div class="page-admin">
          <h2>Manage Players (${state.players.length})</h2>
          <div class="admin-form" id="playerForm">
            <h3>Add New Player</h3>
            <div class="form-grid">
              <input type="text" id="pName" placeholder="Player name" class="admin-input">
              <select id="pRegion" class="admin-input">
                <option value="EU">EU</option>
                <option value="NA">NA</option>
                <option value="SA">SA</option>
                <option value="AS">AS</option>
                <option value="Global">Global</option>
              </select>
              <input type="text" id="pAff" placeholder="Affiliation (optional)" class="admin-input">
              <button class="admin-submit" onclick="addPlayer()">Add Player</button>
            </div>
          </div>
          <div class="admin-list">
            <h3>Current Players</h3>
            <div class="admin-player-list">
              ${state.players.sort((a,b) => (a.name||'').localeCompare(b.name||'')).map(p => `
                <div class="admin-row">
                  <span>${p.name} — ${p.region} ${p.affiliation ? '· ' + p.affiliation : ''} (${p.wins||0}W-${p.losses||0}L)</span>
                  <button class="admin-delete" onclick="deletePlayer('${p.id}')">Delete</button>
                </div>`).join('') || '<p>No players yet.</p>'}
            </div>
          </div>
        </div>`;
    }
    
    function renderAdminMatches() {
      if (!state.isAdmin) return '<div class="error-state"><p>Admin access required.</p></div>';
      const eventOptions = state.events.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
      
      return `
        <div class="page-admin">
          <h2>Add Match</h2>
          <div class="admin-form">
            <div class="form-grid">
              <input type="text" id="mP1" placeholder="Player 1 (winner)" class="admin-input">
              <input type="text" id="mP2" placeholder="Player 2 (opponent)" class="admin-input">
              <input type="text" id="mScore" placeholder="Score (e.g. 9102-6853)" class="admin-input">
              <select id="mRegion" class="admin-input">
                <option value="EU">EU</option>
                <option value="NA">NA</option>
                <option value="SA">SA</option>
                <option value="AS">AS</option>
                <option value="Global">Global</option>
              </select>
              <select id="mEvent" class="admin-input"><option value="">Select event...</option>${eventOptions}</select>
              <input type="text" id="mVod" placeholder="VOD URL (optional)" class="admin-input">
              <input type="text" id="mNotes" placeholder="Notes (optional)" class="admin-input">
              <div class="form-checks">
                <label><input type="checkbox" id="mFotn"> 🌟 Fight of the Night</label>
                <label><input type="checkbox" id="mTitle"> 🏆 Title Fight</label>
              </div>
              <button class="admin-submit" onclick="addMatch()">Add Match</button>
            </div>
          </div>
        </div>`;
    }
    
    function renderAdminEvents() {
      if (!state.isAdmin) return '<div class="error-state"><p>Admin access required.</p></div>';
      return `
        <div class="page-admin">
          <h2>Manage Events (${state.events.length})</h2>
          <div class="admin-form">
            <h3>Add Event</h3>
            <div class="form-grid">
              <input type="text" id="eName" placeholder="Event name (e.g. Fight Night #31)" class="admin-input">
              <select id="eRegion" class="admin-input">
                <option value="Global">Global</option>
                <option value="EU">EU</option>
                <option value="NA">NA</option>
                <option value="SA">SA</option>
                <option value="AS">AS</option>
              </select>
              <label><input type="checkbox" id="eTournament"> 🏆 Tournament</label>
              <button class="admin-submit" onclick="addEvent()">Add Event</button>
            </div>
          </div>
          <div class="admin-list">
            <h3>Events</h3>
            <div class="admin-event-list">
              ${state.events.sort((a,b) => (a.name||'').localeCompare(b.name||'')).map(e => `
                <div class="admin-row">
                  <span>${e.name} — ${e.region || 'Global'} ${e.isTournament ? '🏆' : '🥊'}</span>
                  <button class="admin-delete" onclick="deleteEvent('${e.id}')">Delete</button>
                </div>`).join('') || '<p>No events yet.</p>'}
            </div>
          </div>
        </div>`;
    }
    
    // ── Admin Actions ───────────────────────────────
    window.addPlayer = async function() {
      const name = document.getElementById('pName').value.trim();
      const region = document.getElementById('pRegion').value;
      const aff = document.getElementById('pAff').value.trim();
      if (!name) return alert('Name required');
      
      await addDoc(collection(db, 'players'), {
        name, region, affiliation: aff || null,
        wins: 0, losses: 0, position: 'unranked', tier: 'unranked',
        createdAt: Date.now()
      });
      
      document.getElementById('pName').value = '';
      document.getElementById('pAff').value = '';
      await loadData();
    };
    
    window.deletePlayer = async function(id) {
      if (!confirm('Delete this player?')) return;
      await deleteDoc(doc(db, 'players', id));
      await loadData();
    };
    
    window.addMatch = async function() {
      const player1 = document.getElementById('mP1').value.trim();
      const player2 = document.getElementById('mP2').value.trim();
      const score = document.getElementById('mScore').value.trim();
      const region = document.getElementById('mRegion').value;
      const event = document.getElementById('mEvent').value;
      const vod = document.getElementById('mVod').value.trim();
      const notes = document.getElementById('mNotes').value.trim();
      const fotn = document.getElementById('mFotn').checked;
      const titleFight = document.getElementById('mTitle').checked;
      
      if (!player1 || !player2) return alert('Both players required');
      
      await addDoc(collection(db, 'matches'), {
        player1, player2, score, region, event, vod, notes,
        fotn, titleFight, createdAt: Date.now()
      });
      
      // Clear form
      ['mP1','mP2','mScore','mVod','mNotes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('mFotn').checked = false;
      document.getElementById('mTitle').checked = false;
      await loadData();
    };
    
    window.addEvent = async function() {
      const name = document.getElementById('eName').value.trim();
      const region = document.getElementById('eRegion').value;
      const isTournament = document.getElementById('eTournament').checked;
      if (!name) return alert('Event name required');
      
      await addDoc(collection(db, 'events'), {
        name, region, isTournament, completed: false, createdAt: Date.now()
      });
      
      document.getElementById('eName').value = '';
      document.getElementById('eTournament').checked = false;
      await loadData();
    };
    
    window.deleteEvent = async function(id) {
      if (!confirm('Delete this event?')) return;
      await deleteDoc(doc(db, 'events', id));
      await loadData();
    };
    
    // ── Player Modal (by name) ──────────────────────
    window.showPlayerByName = function(name) {
      // Find player by name (case insensitive)
      const p = state.playerByName[name.toLowerCase()];
      if (!p) return;
      
      const matches = getMatchesForPlayer(name);
      const wins = p.wins || 0;
      const losses = p.losses || 0;
      const total = wins + losses;
      const winRate = total > 0 ? Math.round(wins / total * 100) : 0;
      const fotns = matches.filter(m => m.fotn).length;
      const titles = matches.filter(m => m.titleFight).length;
      
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.onclick = () => modal.remove();
      modal.innerHTML = `
        <div class="modal-content" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
          <div class="player-modal-header" style="--accent:${REGION_COLORS[p.region]||'#666'}">
            <div class="player-avatar large placeholder" style="--accent:${REGION_COLORS[p.region]||'#666'}">${p.name?.charAt(0)?.toUpperCase() || '?'}</div>
            <h2>${p.name} ${REGION_FLAGS[p.region]||''}</h2>
            <div class="player-modal-tags">
              ${isChampion(p) ? '<span class="tier-badge tier-s">👑 Champion</span>' : ''}
              ${p.position && p.position !== 'unranked' ? `<span class="position-badge">${p.position}</span>` : ''}
              ${p.affiliation ? `<span class="aff-tag">${p.affiliation}</span>` : ''}
            </div>
          </div>
          <div class="player-modal-stats">
            <div class="modal-stat"><span class="modal-stat-num">${wins}-${losses}</span><span class="modal-stat-label">Record</span></div>
            <div class="modal-stat"><span class="modal-stat-num">${winRate}%</span><span class="modal-stat-label">Win Rate</span></div>
            <div class="modal-stat"><span class="modal-stat-num">${total}</span><span class="modal-stat-label">Matches</span></div>
            <div class="modal-stat"><span class="modal-stat-num">${fotns}</span><span class="modal-stat-label">FOTNs</span></div>
            <div class="modal-stat"><span class="modal-stat-num">${titles}</span><span class="modal-stat-label">Title Fights</span></div>
          </div>
          <div class="player-modal-history">
            <h3>Match History (${matches.length})</h3>
            ${matches.length > 0 ? `<div class="match-list">${renderMatchList(matches.sort((a,b) => (b.createdAt||0) - (a.createdAt||0)))}</div>` : '<p>No matches recorded.</p>'}
          </div>
        </div>`;
      document.body.appendChild(modal);
    };
    
    // Keep old showPlayer for backwards compat
    window.showPlayer = function(id) {
      const p = state.players.find(x => x.id === id);
      if (p) showPlayerByName(p.name);
    };
    
    // ── Event Modal ─────────────────────────────────
    window.showEvent = function(eventName) {
      const matches = state.matches.filter(m => m.event === eventName);
      const e = state.events.find(x => x.name === eventName);
      
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.onclick = () => modal.remove();
      modal.innerHTML = `
        <div class="modal-content" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
          <div class="player-modal-header">
            <h2>${eventName}</h2>
            <div class="player-modal-tags">
              ${e?.isTournament ? '<span class="tier-badge tier-s">🏆 Tournament</span>' : '<span class="tier-badge tier-a">🥊 Fight Night</span>'}
              <span class="position-badge">${matches.length} matches</span>
            </div>
          </div>
          <div class="player-modal-history">
            <h3>Matches</h3>
            ${matches.length > 0 ? `<div class="match-list">${renderMatchList(matches)}</div>` : '<p>No matches recorded for this event.</p>'}
          </div>
        </div>`;
      document.body.appendChild(modal);
    };
    
    window.onSearch = function(val) {
      state.searchQuery = val;
      render();
      const input = document.getElementById('playerSearch');
      if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    };
    
    function attachHandlers() {
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#adminBtn') && !e.target.closest('#adminMenu')) {
          document.getElementById('adminMenu')?.classList.add('hidden');
        }
      });
    }
    
    // ── Init ────────────────────────────────────────
    loadData();
  </script>
</body>
</html>
