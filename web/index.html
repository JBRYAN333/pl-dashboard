<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>PL Record Book — DW2 Pro League</title>
  <meta name="description" content="DW2 Pro League Record Book — Rankings, player stats, match history and tournament records.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo" onclick="navigate('home')">
          <img src="assets/pl-logo.png" class="logo-img" alt="PL">
          <span class="logo-text">PL<span class="logo-accent">RECORD</span>BOOK</span>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-page="home" onclick="navigate('home')">Home</button>
          <button class="nav-btn" data-page="rankings" onclick="navigate('rankings')">Rankings</button>
          <button class="nav-btn" data-page="players" onclick="navigate('players')">Players</button>
          <button class="nav-btn" data-page="events" onclick="navigate('events')">Events</button>
          <button class="nav-btn" data-page="stats" onclick="navigate('stats')">Stats</button>
        </nav>
        <div class="header-right">
          <div class="region-selector" id="regionSelector">
            <button class="region-btn active" data-region="Global" onclick="setRegion('Global')">ALL</button>
            <button class="region-btn" data-region="EU" onclick="setRegion('EU')">EU</button>
            <button class="region-btn" data-region="NA" onclick="setRegion('NA')">NA</button>
            <button class="region-btn" data-region="SA" onclick="setRegion('SA')">SA</button>
            <button class="region-btn" data-region="AS" onclick="setRegion('AS')">AS</button>
          </div>
          <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">⚙️ Admin</button>
          <div class="admin-menu hidden" id="adminMenu">
            <div id="adminLogin">
              <input type="email" id="adminEmail" placeholder="Email" class="admin-input">
              <input type="password" id="adminPass" placeholder="Password" class="admin-input">
              <button class="admin-login-btn" onclick="adminLogin()">Login</button>
            </div>
            <div id="adminPanel" class="hidden">
              <button class="admin-action" onclick="navigate('admin-players')">Manage Players</button>
              <button class="admin-action" onclick="navigate('admin-matches')">Add Match</button>
              <button class="admin-action" onclick="navigate('admin-events')">Manage Events</button>
              <button class="admin-action" onclick="exportPDF()">📄 Export PDF</button>
              <button class="admin-action" onclick="exportSheets()">📊 Export Sheets</button>
              <button class="admin-logout" onclick="adminLogout()">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="main" id="mainContent">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading PL Record Book...</p>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <p>PL Record Book — Drunken Wrestlers 2 Pro League</p>
        <p class="footer-sub">Data source: Firestore · Built with ❤️ by ProtagoNix</p>
      </div>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
